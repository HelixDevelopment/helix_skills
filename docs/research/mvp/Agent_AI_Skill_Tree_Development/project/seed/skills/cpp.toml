[skill]
name = "cpp.language"
version = "0.1.0"
title = "C++ Programming Language"
description = "Reference for ISO C++: standards cadence, RAII/smart pointers, templates and the STL, and its role in AOSP native modules and the R6 wizard tech set."
content = """
# C++

## Overview
C++ is a general-purpose, statically-typed, compiled language created by
Bjarne Stroustrup as an extension of C ("C with Classes"), first
standardized as ISO/IEC 14882:1998. It layers object-oriented, generic
(templates), and — since C++11 — functional and concurrency features on top
of C's low-level control over memory and hardware.

## Key facts
- Standards cadence: C++11, 14, 17, 20, 23 on a three-year ISO release
  cycle; each adds language and library features (move semantics in C++11,
  concepts/ranges/coroutines in C++20).
- RAII (Resource Acquisition Is Initialization) with deterministic
  destructors is the central resource-management idiom; smart pointers
  (`std::unique_ptr`, `std::shared_ptr`) replace manual `new`/`delete` in
  modern code.
- Templates provide compile-time generics; the Standard Template Library
  (STL) supplies containers (`vector`, `map`, `unordered_map`), iterators,
  and generic algorithms.
- Zero-overhead abstraction principle: language features you don't use cost
  nothing at runtime, distinguishing C++ from most managed languages.
- No garbage collector — memory/lifetime bugs (use-after-free, double-free)
  are why AddressSanitizer, Valgrind, and static analyzers such as
  clang-tidy are core to the everyday C++ toolchain.
- Compiled by GCC, Clang, and MSVC; builds are typically orchestrated by
  CMake or Bazel rather than invoking the compiler directly.

## Why it matters here
C++ underlies AOSP's native (`cc_binary`/`cc_library` Soong) modules and the
Android NDK, and is one of the six technologies named in the R6 canonical
wizard example alongside Android, Kotlin, Java, and CMake.
"""

