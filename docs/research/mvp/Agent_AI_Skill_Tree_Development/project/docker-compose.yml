# =============================================================================
# HelixKnowledge Skill Graph System - Docker Compose Stack
# =============================================================================
# Services: PostgreSQL + pgvector, API server, background worker
# Ports: 8080 (HTTP/2 TCP), 8443 (HTTP/3 UDP), 5432 (PostgreSQL)
# =============================================================================

version: '3.8'

services:
  # -------------------------------------------------------------------------
  # Database: PostgreSQL 16 with pgvector extension
  # -------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: skill-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-skilldb}
      POSTGRES_USER: ${DB_USER:-skilluser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skillpassword}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-skilluser} -d ${DB_NAME:-skilldb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - skill-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: ${DB_MEMORY_LIMIT:-1G}
        reservations:
          memory: 256M

  # -------------------------------------------------------------------------
  # API Server: HTTP/2 + HTTP/3 REST API with MCP support
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: skill-system:${VERSION:-latest}
    container_name: skill-api
    restart: unless-stopped
    command: >
      /app/server
      --config /config/config.toml
      --db-host db
      --db-port 5432
      --db-name ${DB_NAME:-skilldb}
      --db-user ${DB_USER:-skilluser}
      --db-password ${DB_PASSWORD:-skillpassword}
      --http-port 8080
      --http3-port 8443
      --log-level ${LOG_LEVEL:-info}
    environment:
      # Database
      DATABASE_URL: postgres://${DB_USER:-skilluser}:${DB_PASSWORD:-skillpassword}@db:5432/${DB_NAME:-skilldb}?sslmode=disable
      # Server configuration
      SERVER_HTTP_PORT: "8080"
      SERVER_HTTP3_PORT: "8443"
      SERVER_LOG_LEVEL: ${LOG_LEVEL:-info}
      # Embedding service
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      # Feature flags
      ENABLE_HTTP3: ${ENABLE_HTTP3:-true}
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      ENABLE_AUTO_EXPAND: ${ENABLE_AUTO_EXPAND:-true}
      # MCP
      MCP_SERVER_NAME: ${MCP_SERVER_NAME:-skill-system}
      MCP_VERSION: ${MCP_VERSION:-1.0.0}
      # Security
      JWT_SECRET: ${JWT_SECRET:-}
      API_KEY: ${API_KEY:-}
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${HTTP3_PORT:-8443}:8443/udp"
    volumes:
      - ./config:/config:ro
      - evidence_data:/data/evidence
      - api_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - skill-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-512M}
          cpus: '${API_CPU_LIMIT:-1}'
        reservations:
          memory: 128M
    # Graceful shutdown
    stop_signal: SIGTERM
    stop_grace_period: 30s

  # -------------------------------------------------------------------------
  # Background Worker: Skill expansion, validation, embedding generation
  # -------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: skill-system:${VERSION:-latest}
    container_name: skill-worker
    restart: unless-stopped
    command: >
      /app/worker
      --config /config/config.toml
      --db-host db
      --db-port 5432
      --db-name ${DB_NAME:-skilldb}
      --db-user ${DB_USER:-skilluser}
      --db-password ${DB_PASSWORD:-skillpassword}
      --log-level ${LOG_LEVEL:-info}
    environment:
      DATABASE_URL: postgres://${DB_USER:-skilluser}:${DB_PASSWORD:-skillpassword}@db:5432/${DB_NAME:-skilldb}?sslmode=disable
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      WORKER_QUEUE_SIZE: ${WORKER_QUEUE_SIZE:-100}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-30s}
      # Embedding
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      # Auto-expansion
      AUTO_EXPAND_ENABLED: ${AUTO_EXPAND_ENABLED:-true}
      AUTO_EXPAND_MAX_DEPTH: ${AUTO_EXPAND_MAX_DEPTH:-3}
      AUTO_EXPAND_CONFIDENCE_THRESHOLD: ${AUTO_EXPAND_CONFIDENCE_THRESHOLD:-0.7}
      # Validation
      VALIDATION_ENABLED: ${VALIDATION_ENABLED:-true}
      VALIDATION_INTERVAL: ${VALIDATION_INTERVAL:-1h}
      # LLM for expansion (optional)
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      # Code analysis
      CODE_ANALYSIS_ENABLED: ${CODE_ANALYSIS_ENABLED:-true}
      CODE_ANALYSIS_MAX_FILES: ${CODE_ANALYSIS_MAX_FILES:-1000}
    volumes:
      - ./config:/config:ro
      - evidence_data:/data/evidence
      - worker_logs:/app/logs
      # Mount source code directory for analysis (optional)
      - ${SOURCE_CODE_PATH:-/dev/null}:/data/source:ro
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker.pid && kill -0 $(cat /tmp/worker.pid) || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - skill-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEMORY_LIMIT:-1G}
          cpus: '${WORKER_CPU_LIMIT:-2}'
        reservations:
          memory: 256M
    # Graceful shutdown
    stop_signal: SIGTERM
    stop_grace_period: 60s

  # -------------------------------------------------------------------------
  # Optional: Prometheus metrics scraping
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: skill-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - skill-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -------------------------------------------------------------------------
  # Optional: Grafana dashboards
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: skill-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - skill-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  evidence_data:
    driver: local
  api_logs:
    driver: local
  worker_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  skill-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
