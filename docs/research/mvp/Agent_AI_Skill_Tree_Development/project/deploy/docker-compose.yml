# =============================================================================
# HelixKnowledge Skill Graph Service - datastore compose stack (R15)
# =============================================================================
# Scope: this compose file is the systemctl --user-operable datastore layer.
# It brings up PostgreSQL + pgvector only. The application service block below
# is intentionally commented out - the Go binary is not wired to a container
# image yet, and shipping a fake/placeholder "app" image here would be a
# bluff (nothing would actually run). Uncomment + finish the `app` service
# once cmd/server builds a real, tagged image.
#
# Usage (see ../scripts/ for the systemctl --user-friendly wrappers):
#   docker compose --env-file .env -f docker-compose.yml up -d
#   podman compose --env-file .env -f docker-compose.yml up -d
#   podman-compose --env-file .env -f docker-compose.yml up -d
#
# All variables below have dev-safe defaults via ${VAR:-default} so the
# stack runs even with no .env file present. Copy .env.example to .env and
# edit it for anything beyond local development.
# =============================================================================

name: ${COMPOSE_PROJECT_NAME:-helix-skills}

services:
  # ---------------------------------------------------------------------
  # postgres: PostgreSQL 16 with the pgvector extension pre-installed.
  # ---------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${COMPOSE_PROJECT_NAME:-helix-skills}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-skilldb}
      POSTGRES_USER: ${DB_USER:-skilluser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skillpassword}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - helix_skills_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-skilluser} -d ${DB_NAME:-skilldb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------
  # app: HelixKnowledge Skill Graph API server.
  #
  # DISABLED (commented out) until a real, buildable/runnable image exists
  # for cmd/server. Do NOT uncomment this with an invented/placeholder
  # image - that would be a bluff (R15/anti-bluff mandate: no claim of a
  # working app service without a real build behind it). Once the Go
  # binary builds cleanly, wire it up along these lines:
  #
  # app:
  #   build:
  #     context: ..
  #     dockerfile: Dockerfile
  #     args:
  #       VERSION: ${VERSION:-dev}
  #   image: ${COMPOSE_PROJECT_NAME:-helix-skills}-app:${VERSION:-dev}
  #   container_name: ${COMPOSE_PROJECT_NAME:-helix-skills}-app
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgres://${DB_USER:-skilluser}:${DB_PASSWORD:-skillpassword}@postgres:5432/${DB_NAME:-skilldb}?sslmode=disable
  #   ports:
  #     - "${HTTP_PORT:-8080}:8080"

volumes:
  helix_skills_pgdata:
    name: ${COMPOSE_PROJECT_NAME:-helix-skills}_pgdata
