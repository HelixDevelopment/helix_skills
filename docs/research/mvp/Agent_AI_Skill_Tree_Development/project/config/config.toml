# HelixKnowledge Skill System Configuration

[server]
host = "0.0.0.0"
http_port = 8080
http3_port = 8443
enable_http3 = false
enable_brotli = true
tls_cert = ""
tls_key = ""
# --- Authentication & CORS (both /api/v1 and /mcp/v1 are governed by these) ---
# api_keys: keys accepted via the X-API-Key header. LEAVE EMPTY here and supply
# real keys through the HELIX_API_KEYS environment variable (comma-separated) so
# secrets never live in tracked config (§11.4.10). ${VAR} placeholders are
# interpolated from the environment; an unresolved placeholder fails closed.
# api_keys = []
#
# auth_disabled: when true, /api/v1 and /mcp/v1 run with NO authentication. The
# default (false) is FAIL-CLOSED: with no api_keys AND auth_disabled=false the
# server rejects every /api/v1 and /mcp/v1 request with HTTP 503 until keys are
# configured. Set true ONLY for a deliberately open deployment.
# auth_disabled = false
#
# allowed_origins: CORS allowlist of exact origins (e.g. "https://app.example.com").
# Empty (the default) is fail-closed — no cross-origin browser access, and no
# wildcard "*" is ever emitted. A single "*" entry allows any origin but ONLY
# for non-credentialed requests.
# allowed_origins = []

[database]
host = "db"
port = 5432
database = "skilldb"
user = "skill"
password = "${DB_PASSWORD}"          # MUST be set in the environment — never hardcoded (§11.4.10)
ssl_mode = "require"               # require TLS; set to "disable" only for local dev
max_connections = 25

[embedding]
provider = "openai"
dimensions = 768
model = "text-embedding-3-small"
api_key = ""
local_endpoint = ""

[validation]
enabled = true
jury_size = 3
approval_threshold = 2
auto_approve_evidence = false
require_human_review = true

[autoexpand]
enabled = true
max_depth = 5
max_new_skills_per_run = 10
llm_provider = "openai"
llm_model = "gpt-4o-mini"

[codeanalysis]
enabled = true
languages = ["java", "kotlin", "c", "cpp", "python", "go"]
max_file_size_kb = 500
exclude_patterns = ["vendor/", "node_modules/", ".git/", "build/"]
# allowed_root: the SINGLE filesystem root that a submitted project_path
# (learn_from_project MCP tool) MUST canonicalize inside (§G31 path-traversal
# / LFI guard). Empty (the default) is FAIL-CLOSED -- every project_path
# submission is rejected until this is set. Set to a dedicated
# projects/workspaces directory before relying on learn_from_project, or
# supply it via the HELIX_CODEANALYSIS_ALLOWED_ROOT environment variable.
# allowed_root = ""

[mcp]
enabled = true
transport = "stdio"

[registry]
review_interval_hours = 24
coverage_threshold = 0.8

[logging]
level = "info"
format = "json"
