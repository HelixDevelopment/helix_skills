# catalog-engine roots — helix_skills PROJECT INJECTION (§11.4.28).
# Scans all test scripts under tests/ and constitution/tests/.
# Cross-ref: docs/research/test_catalog/P0_design.md §1 corpus enumeration.

roots:
  - root: tests
    type: pre_build
    glob: "*.sh"

  - root: constitution/tests
    type: constitution_gate
    glob: "*.sh"

  - root: constitution/scripts/hooks
    type: hook_test
    glob: "test_*.sh"

  - root: constitution/scripts/gates
    type: meta-test-mutation
    glob: "*_mutation_test.sh"

  - root: constitution/scripts/multitrack
    type: multitrack_test
    glob: "test_*.sh"

  - root: constitution/scripts/workable-items/cmd/workable-items
    type: workable_items_test
    glob: "*_test.go"

  - root: constitution
    type: constitution_gate
    glob: "meta_test_*.sh"
